<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 11 REMOVECHILD</title>
</head>
<body>
    <div id="contenedor">
        <p id="eliminado">Eliminar</p>
    </div>
    <script>
        const elementoEliminar=document.getElementById('eliminado')
        const elementoPadre=elementoEliminar.parentNode
        elementoPadre.removeChild(elementoEliminar)
    </script>
</body>
</html>
