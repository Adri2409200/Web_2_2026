<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO 10 APPENDCHILD</title>
</head>
<body>
    <div id="contenedor">Contenedor inicial</div>
    <button id="boton">Agregar elemento</button>
    <script>
        const nuevo_elemento=document.createElement('div')
        nuevo_elemento.textContent='elemento creardo con DOM'
        const contenedor=document.getElementById('contenedor')
        contenedor.appendChild(nuevo_elemento)
        console.log(contenedor)
    </script>
</body>
</html>
