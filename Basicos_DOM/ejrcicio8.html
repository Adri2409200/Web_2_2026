<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USO DE STYLE</title>
</head>
<body>
    <p>uno</p>
    <p>dos</p>
    <p>tres</p>
    <p>cuatro</p>
    <script>
        const parrafos=document.querySelectorAll('p')
        parrafos.forEach(parrafos => {
        parrafos.style.color='red'
        parrafos.style.fontSize='20px'
        parrafos.style.fontFamily='Arial'
        parrafos.style.backgroundColor='yellow'
        parrafos.style.backgroundColor='black'
    })
        
    </script>
</body>
</html>
